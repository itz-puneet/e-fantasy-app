<svg xmlns="http://www.w3.org/2000/svg" width="320" height="660" viewBox="0 0 320 660" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="320" height="660" rx="26" fill="#0F1115"/>
  <!-- status bar -->
  <text x="24" y="34" fill="#7E8899" font-size="12" font-weight="600">9:41</text>
  <circle cx="286" cy="30" r="3" fill="#7E8899"/><circle cx="296" cy="30" r="3" fill="#7E8899"/><circle cx="306" cy="30" r="3" fill="#7E8899"/>
  <!-- header with back -->
  <text x="24" y="66" fill="#E6EAF0" font-size="20" font-weight="800">‹  Build Your Team</text>
  <text x="42" y="88" fill="#A3ACBD" font-size="12">Pick 12 players + 1 team</text>
  <!-- summary banner -->
  <rect x="24" y="104" width="272" height="52" rx="12" fill="#1FCB6B"/>
  <text x="40" y="128" fill="#04160B" font-size="13" font-weight="700">Players</text>
  <text x="40" y="146" fill="#04160B" font-size="18" font-weight="800">12 / 12</text>
  <text x="190" y="128" fill="#04160B" font-size="13" font-weight="700">Team</text>
  <text x="190" y="146" fill="#04160B" font-size="18" font-weight="800">1 / 1</text>
  <!-- player row 1 (Captain) -->
  <rect x="24" y="172" width="272" height="58" rx="12" fill="#1C2029" stroke="#2C3340"/>
  <circle cx="52" cy="201" r="16" fill="#242A35"/>
  <text x="52" y="206" fill="#A3ACBD" font-size="13" font-weight="700" text-anchor="middle">JN</text>
  <text x="80" y="196" fill="#E6EAF0" font-size="14" font-weight="700">Jonathan</text>
  <text x="80" y="214" fill="#7E8899" font-size="11">Godlike Esports</text>
  <circle cx="272" cy="201" r="15" fill="#1FCB6B"/>
  <text x="272" y="206" fill="#04160B" font-size="12" font-weight="800" text-anchor="middle">C</text>
  <!-- player row 2 (Vice-Captain) -->
  <rect x="24" y="238" width="272" height="58" rx="12" fill="#1C2029" stroke="#2C3340"/>
  <circle cx="52" cy="267" r="16" fill="#242A35"/>
  <text x="52" y="272" fill="#A3ACBD" font-size="13" font-weight="700" text-anchor="middle">SC</text>
  <text x="80" y="262" fill="#E6EAF0" font-size="14" font-weight="700">ScoutOP</text>
  <text x="80" y="280" fill="#7E8899" font-size="11">Team XSpark</text>
  <circle cx="272" cy="267" r="15" fill="#8B5CF6"/>
  <text x="272" y="272" fill="#FFFFFF" font-size="11" font-weight="800" text-anchor="middle">VC</text>
  <!-- player row 3 -->
  <rect x="24" y="304" width="272" height="58" rx="12" fill="#1C2029" stroke="#2C3340"/>
  <circle cx="52" cy="333" r="16" fill="#242A35"/>
  <text x="52" y="338" fill="#A3ACBD" font-size="13" font-weight="700" text-anchor="middle">MV</text>
  <text x="80" y="328" fill="#E6EAF0" font-size="14" font-weight="700">MavI</text>
  <text x="80" y="346" fill="#7E8899" font-size="11">Global Esports</text>
  <!-- player row 4 -->
  <rect x="24" y="370" width="272" height="58" rx="12" fill="#1C2029" stroke="#2C3340"/>
  <circle cx="52" cy="399" r="16" fill="#242A35"/>
  <text x="52" y="404" fill="#A3ACBD" font-size="13" font-weight="700" text-anchor="middle">JX</text>
  <text x="80" y="394" fill="#E6EAF0" font-size="14" font-weight="700">Jelly</text>
  <text x="80" y="412" fill="#7E8899" font-size="11">Revenant XSpark</text>
  <!-- player row 5 -->
  <rect x="24" y="436" width="272" height="58" rx="12" fill="#1C2029" stroke="#2C3340"/>
  <circle cx="52" cy="465" r="16" fill="#242A35"/>
  <text x="52" y="470" fill="#A3ACBD" font-size="13" font-weight="700" text-anchor="middle">SP</text>
  <text x="80" y="460" fill="#E6EAF0" font-size="14" font-weight="700">Spower</text>
  <text x="80" y="478" fill="#7E8899" font-size="11">GodLike Esports</text>
  <text x="24" y="524" fill="#7E8899" font-size="12">+ 7 more selected</text>
  <!-- save button -->
  <rect x="24" y="556" width="272" height="52" rx="12" fill="#1FCB6B"/>
  <text x="160" y="588" fill="#04160B" font-size="15" font-weight="700" text-anchor="middle">Save Team</text>
</svg>
